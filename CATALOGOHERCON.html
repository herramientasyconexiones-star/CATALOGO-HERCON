<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Catálogo HERCON - Herramientas y Conexiones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .search-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42,82,152,0.1);
        }
        .search-btn {
            padding: 15px 30px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .search-btn:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }
        .stats {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid #e0e0e0;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }
        .product-info {
            padding: 20px;
        }
        .product-code {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .product-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #333;
            line-height: 1.4;
            min-height: 44px;
        }
        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #2a5298;
            margin-bottom: 8px;
        }
        .product-stock {
            font-size: 13px;
            color: #28a745;
            margin-bottom: 12px;
        }
        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .add-to-cart:hover {
            background: #218838;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 50px;
            color: #dc3545;
            background: #f8d7da;
            margin: 30px;
            border-radius: 10px;
        }
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 15px;
            }
            .header h1 {
                font-size: 1.8em;
            }
            .search-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Catálogo HERCON</h1>
            <p>Herramientas y Conexiones - Calidad y Precio</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar por código, nombre o referencia...">
                <button onclick="filterProducts()" class="search-btn">Buscar</button>
            </div>
            <div class="stats" id="stats">
                Cargando productos...
            </div>
        </div>

        <div id="productsGrid" class="products-grid">
            <div class="loading">
                ⏳ Cargando catálogo de productos...
            </div>
        </div>
    </div>

    <script>
        let productsData = [];

        // Cargar productos desde el archivo JSON
        async function loadProducts() {
            try {
                const response = await fetch('precios.json');
                if (!response.ok) {
                    throw new Error(`Error al cargar precios.json: ${response.status}`);
                }
                const data = await response.json();
                productsData = data;
                displayProducts(productsData);
                updateStats(productsData.length);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="error">
                        ❌ Error al cargar los productos: ${error.message}<br><br>
                        <strong>Solución:</strong> Asegúrate de que el archivo <code>precios.json</code> exista en el repositorio.
                    </div>
                `;
                document.getElementById('stats').innerHTML = '❌ Error al cargar datos';
            }
        }

        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="loading">😕 No se encontraron productos. Intenta con otra búsqueda.</div>';
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        ${getIconForProduct(product.NOMBRE || product.nombre || '')}
                    </div>
                    <div class="product-info">
                        <div class="product-code">Código: ${product.CODIGO || product.codigo || 'N/A'}</div>
                        <div class="product-name">${product.NOMBRE || product.nombre || 'Sin nombre'}</div>
                        <div class="product-price">$${formatPrice(product.PRECIO || product.precio || 0)}</div>
                        <div class="product-stock">✅ Disponible</div>
                        <button class="add-to-cart" onclick="showProductInfo('${(product.CODIGO || product.codigo || '').replace(/'/g, "\\'")}')">
                            📞 Solicitar Cotización
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getIconForProduct(name) {
            const nameLower = (name || '').toLowerCase();
            if (nameLower.includes('taladro') || nameLower.includes('perforador')) return '🔨';
            if (nameLower.includes('sierra')) return '⚙️';
            if (nameLower.includes('llave')) return '🔧';
            if (nameLower.includes('martillo')) return '🔨';
            if (nameLower.includes('pintura')) return '🎨';
            return '🛠️';
        }

        function formatPrice(price) {
            if (typeof price === 'string') {
                price = parseFloat(price.replace(/[$,]/g, ''));
            }
            return isNaN(price) ? '0' : price.toLocaleString('es-MX', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (!searchTerm) {
                displayProducts(productsData);
                updateStats(productsData.length);
                return;
            }

            const filtered = productsData.filter(product => {
                const codigo = (product.CODIGO || product.codigo || '').toLowerCase();
                const nombre = (product.NOMBRE || product.nombre || '').toLowerCase();
                return codigo.includes(searchTerm) || nombre.includes(searchTerm);
            });
            
            displayProducts(filtered);
            updateStats(filtered.length, searchTerm);
        }

        function updateStats(count, searchTerm = '') {
            const statsDiv = document.getElementById('stats');
            if (searchTerm) {
                statsDiv.innerHTML = `📊 Mostrando ${count} producto(s) para "${searchTerm}" | Total en catálogo: ${productsData.length}`;
            } else {
                statsDiv.innerHTML = `📊 Total de productos disponibles: ${count}`;
            }
        }

        function showProductInfo(productCode) {
            const product = productsData.find(p => (p.CODIGO || p.codigo) === productCode);
            if (product) {
                alert(`📞 Para cotizar o comprar:\n\nCódigo: ${product.CODIGO || product.codigo}\nProducto: ${product.NOMBRE || product.nombre}\nPrecio: $${formatPrice(product.PRECIO || product.precio)}\n\nContáctanos:\n📱 WhatsApp: [Tu número]\n📧 Email: [tu@email.com]`);
            }
        }

        // Agregar evento de búsqueda al presionar Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                filterProducts();
            }
        });

        // Cargar productos al iniciar
        loadProducts();
    </script>
</body>
</html>
